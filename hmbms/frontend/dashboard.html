<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="HMBMS Dashboard — Human Milk Bank Management System" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Dashboard — HMBMS</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="assets/css/dashboard.css" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍼</text></svg>" />
</head>
<body class="dashboard-page">

  <!-- ─── SIDEBAR ──────────────────────────────────────────────── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <div class="nav-logo-icon">
          <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
        </div>
        <div class="nav-brand-text">
          <span class="nav-system-name">HMBMS</span>
          <span class="nav-org-name">Makati Human Milk Bank</span>
        </div>
      </div>
    </div>

    <nav class="sidebar-nav" id="sidebar-nav" aria-label="Dashboard navigation">
      <!-- Navigation items will be dynamically generated based on role -->
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-user" id="sidebar-user">
        <div class="sidebar-user-avatar" id="user-avatar">?</div>
        <div class="sidebar-user-info">
          <span class="sidebar-user-name" id="user-fullname">Loading...</span>
          <span class="sidebar-user-role" id="user-role-label">—</span>
        </div>
      </div>
      <button class="sidebar-logout-btn" id="logout-btn" aria-label="Log out">
        <svg viewBox="0 0 24 24"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
        Logout
      </button>
    </div>
  </aside>

  <!-- ─── MOBILE HEADER ─────────────────────────────────────── -->
  <header class="dash-mobile-header" id="dash-mobile-header">
    <button class="sidebar-toggle-btn" id="sidebar-toggle" aria-label="Toggle sidebar">
      <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
    </button>
    <span class="dash-mobile-title">HMBMS Dashboard</span>
    <div class="dash-mobile-notif" id="mobile-notif-btn">
      <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
      <span class="notif-badge" id="mobile-notif-badge" style="display:none;">0</span>
    </div>
  </header>

  <!-- ─── MAIN CONTENT ─────────────────────────────────────── -->
  <main class="dash-main" id="dash-main">
    <!-- Top Bar -->
    <div class="dash-topbar" id="dash-topbar">
      <div class="dash-topbar-left">
        <h1 class="dash-page-title" id="page-title">Dashboard</h1>
        <p class="dash-page-subtitle" id="page-subtitle">Welcome back</p>
      </div>
      <div class="dash-topbar-right">
        <div class="notif-dropdown" id="notif-dropdown">
          <button class="notif-btn" id="notif-btn" aria-label="Notifications">
            <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
            <span class="notif-badge" id="notif-badge" style="display:none;">0</span>
          </button>
          <div class="notif-panel" id="notif-panel" style="display:none;">
            <div class="notif-panel-header">
              <h3>Notifications</h3>
              <button id="mark-all-read" class="notif-read-all">Mark all read</button>
            </div>
            <div class="notif-list" id="notif-list">
              <p class="notif-empty">No notifications</p>
            </div>
          </div>
        </div>
        <div class="topbar-user">
          <span id="topbar-username">—</span>
          <div class="topbar-avatar" id="topbar-avatar">?</div>
        </div>
      </div>
    </div>

    <!-- Content Area — dynamically populated -->
    <div class="dash-content" id="dash-content">
      <div class="dash-loading">
        <div class="loading-spinner"></div>
        <p>Loading dashboard...</p>
      </div>
    </div>
  </main>

  <!-- ─── SIDEBAR OVERLAY (mobile) ──────────────────────────── -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- ─── MODAL CONTAINER ───────────────────────────────────── -->
  <div class="modal-overlay" id="modal-overlay" style="display:none;">
    <div class="modal-content" id="modal-content">
      <div class="modal-header">
        <h2 id="modal-title">Modal</h2>
        <button class="modal-close" id="modal-close" aria-label="Close modal">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- ─── TOAST CONTAINER ──────────────────────────────────── -->
  <div class="toast-container" id="toast-container"></div>

  <script src="assets/js/dashboard.js"></script>
</body>
</html>

# Render Blueprint Configuration
# Deploy by going to Render Dashboard -> New + -> Blueprint
databases:
  - name: hmbms-db
    plan: free
    databaseName: hmbms
    user: hmbms_user

services:
  - type: web
    name: hmbms-server
    runtime: node
    plan: free
    buildCommand: cd hmbms/backend && npm install
    startCommand: cd hmbms/backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: hmbms-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
